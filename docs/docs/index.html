<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyLock</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef3f8;
      color: #142536;
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 80px auto;
      padding: 40px;
      background: white;
      border: 1px solid #d8e1ea;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(20, 37, 54, 0.08);
    }
    h1 {
      margin-top: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 42px;
    }
    a {
      color: #446b8f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>StudyLock</h1>
    <p>StudyLock is a local-first Chrome extension for focused online study sessions.</p>
    <ul>
      <li>No account required</li>
      <li>No backend</li>
      <li>No cloud sync</li>
      <li>No external analytics</li>
      <li>Study data is stored locally in your browser</li>
    </ul>
    <p><a href="./privacy/">Privacy Policy</a></p>
  </main>
</body>
</html>
